<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
    <title>Weather App</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form class="search-form" id="search-form">
          <input
            type="search"
            placeholder="Enter a city.."
            required
            id="search-form-input"
            class="search-form-input"
          />
          <input type="submit" value="Search" class="search-form-button" />
        </form>
      </header>
      <main>
        <div class="weather-app-data">
          <div>
            <h1 class="weather-app-city" id="city">Paris</h1>
            <p class="weather-app-details">
              Tuesday 14:49, scattered clouds
              <br />
              Humidity: <strong>65%</strong>, Wind: <strong>3.13km/h</strong>
            </p>
          </div>
          <div class="weather-app-temperature-container">
            <div class="weather-app-icon">⛅</div>
            <div class="weather-app-temperature">12</div>
            <div class="weather-app-unit">℃</div>
          </div>
        </div>
      </main>
      <hr />
      <footer>
        <div style="text-align: end">
          <small style="font-family: monospace">
            Coded by
            <a
              href="https://github.com/szouga"
              target="_blank"
              style="font-style: italic"
            >
              Sophie Clement Zouga Ndong
            </a>
            <br />
            Code hosted on
            <a
              href="https://github.com/szouga/shecodes_weather_app_project"
              target="_blank"
              style="text-decoration: underline; font-weight: 700"
            >
              Github <br />
            </a>
            Website on
            <a
              href="https://shecodes-weather-app-project-sczn.netlify.app/"
              target="_blank"
              style="text-decoration: underline; font-weight: 700"
            >
              Netlify
            </a>
          </small>
        </div>
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
