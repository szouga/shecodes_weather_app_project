<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/style.css" />
    <title>Weather App</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form>
          <input type="search" placeholder="Enter a city.." required />
          <input type="submit" value="Search" />
        </form>
      </header>
      <main>
        <div>
          <h1>Paris</h1>
          <p>
            Tuesday 14:49, scattered clouds
            <br />
            Humidity: 65%, Wind: 3.13km/h
          </p>
        </div>
        <div>⛅ 12℃</div>
      </main>
      <hr />
      <footer>
        <div style="text-align: end">
          <small style="font-family: monospace">
            Coded by
            <a
              href="https://github.com/szouga"
              target="_blank"
              style="font-style: italic"
            >
              Sophie Clement Zouga Ndong
            </a>
            <br />
            Code hosted on
            <a
              href="https://github.com/szouga/shecodes_weather_app_project"
              target="_blank"
              style="text-decoration: underline; font-weight: 700"
            >
              Github <br />
            </a>
            Website on
            <a
              href="https://shecodes-weather-app-project-sczn.netlify.app/"
              target="_blank"
              style="text-decoration: underline; font-weight: 700"
            >
              Netlify
            </a>
          </small>
        </div>
      </footer>
    </div>
  </body>
</html>
